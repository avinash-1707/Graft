worker_processes auto;
events { worker_connections 2048; }

http {
  # WebSocket upgrade plumbing for the chat pool.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # ai-service: stateless per-turn SSE — round-robin is fine (cross-instance
  # delivery rides Redis Pub/Sub, so any instance can serve any turn).
  upstream ai_pool {
    server ai-service-1:8083;
    server ai-service-2:8083;
  }

  # chat-service: persistent Socket.IO WS — pin a client to one instance
  # (connection affinity, invariant 13); the Redis adapter fans broadcasts
  # across instances.
  upstream chat_pool {
    ip_hash;
    server chat-service-1:8084;
    server chat-service-2:8084;
  }

  server {
    listen 8090;
    location / {
      proxy_pass http://ai_pool;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      # SSE: never buffer, hold the stream open.
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 1h;
    }
  }

  server {
    listen 8091;
    location / {
      proxy_pass http://chat_pool;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 1h;
    }
  }
}
