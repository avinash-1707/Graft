# Scrapes every Graft service's /metrics. Both ai-service and chat-service have
# two targets — the `instance` label (host:port) separates them, while the
# metric's own `service` label and the scrape `job` group them.
global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ['gateway:8080']

  - job_name: ai-service
    static_configs:
      - targets: ['ai-service-1:8083', 'ai-service-2:8083']

  - job_name: chat-service
    static_configs:
      - targets: ['chat-service-1:8084', 'chat-service-2:8084']

  - job_name: ingestion-service
    static_configs:
      - targets: ['ingestion-service:8082']
