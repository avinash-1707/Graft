# Receives OTLP traces from every Graft service and forwards them to Tempo.
# Services export to http://otel-collector:4318/v1/traces (OTEL_EXPORTER_OTLP_ENDPOINT).
receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch: {}

exporters:
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
