# Full local stack for unit 29: every Graft service (with 2x ai-service and
# 2x chat-service behind an Nginx load balancer to exercise cross-instance
# Redis fan-out + WS affinity), the datastores, and a unified observability
# stack (Prometheus metrics, Tempo traces, Loki logs, Grafana).
#
#   docker compose -f ops/compose.yaml --env-file ops/.env up -d --build
#
# Ports on the host:
#   8080  gateway (public ingress)         3300  grafana
#   8082  ingestion-service                9009  prometheus
#   8090  nginx → ai-service (round robin) 9001  minio console
#   8091  nginx → chat-service (sticky WS)

name: graft

# --- shared env for the Node app services ---------------------------------
x-app-env: &app-env
  NODE_ENV: production
  LOG_LEVEL: info
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318/v1/traces
  OTEL_SERVICE_VERSION: "0.0.0"
  DATABASE_URL: postgres://graft:graft@postgres:5432/graft
  REDIS_URL: redis://redis:6379
  AI_KEY_ENCRYPTION_KEY: ${AI_KEY_ENCRYPTION_KEY}
  AI_KEY_ENCRYPTION_KEY_ID: v1
  AUTH_JWKS_URL: http://gateway:8080/api/auth/jwks
  AUTH_ISSUER: ${PUBLIC_GATEWAY_URL:-http://localhost:8080}
  AUTH_AUDIENCE: ${PUBLIC_GATEWAY_URL:-http://localhost:8080}

x-ai-build: &ai-build
  build:
    context: ..
    dockerfile: ops/docker/Dockerfile
    args:
      PKG: "@graft/ai-service"
      DIR: apps/ai-service
  image: graft/ai-service:local

x-chat-build: &chat-build
  build:
    context: ..
    dockerfile: ops/docker/Dockerfile
    args:
      PKG: "@graft/chat-service"
      DIR: apps/chat-service
  image: graft/chat-service:local

services:
  # --- datastores --------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: graft
      POSTGRES_PASSWORD: graft
      POSTGRES_DB: graft
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graft -d graft"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/graft-kb &&
        echo "bucket ready"
    restart: "no"

  # --- one-shot DB migration (drizzle-kit) -------------------------------
  migrate:
    build:
      context: ..
      dockerfile: ops/docker/Dockerfile
      target: builder
      args:
        PKG: "@graft/db"
        DIR: packages/db
    image: graft/migrate:local
    working_dir: /repo/packages/db
    environment:
      DATABASE_URL: postgres://graft:graft@postgres:5432/graft
    command: ["pnpm", "exec", "drizzle-kit", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # --- gateway (single public ingress) -----------------------------------
  gateway:
    build:
      context: ..
      dockerfile: ops/docker/Dockerfile
      args:
        PKG: "@graft/gateway"
        DIR: apps/gateway
    image: graft/gateway:local
    environment:
      <<: *app-env
      OTEL_SERVICE_NAME: gateway
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${PUBLIC_GATEWAY_URL:-http://localhost:8080}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN:-http://localhost:3001}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # --- ai-service (2 instances + worker) ---------------------------------
  ai-service-1:
    <<: *ai-build
    environment:
      <<: *app-env
      OTEL_SERVICE_NAME: ai-service
    # Direct host port (alongside the nginx pool) so the load test can target a
    # specific instance for cross-instance fan-out checks.
    ports:
      - "8093:8083"
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  ai-service-2:
    <<: *ai-build
    environment:
      <<: *app-env
      OTEL_SERVICE_NAME: ai-service
    ports:
      - "8094:8083"
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  ai-worker:
    <<: *ai-build
    command: ["node", "dist/worker/index.js"]
    environment:
      <<: *app-env
      OTEL_SERVICE_NAME: ai-worker
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # --- chat-service (2 instances behind sticky LB) -----------------------
  chat-service-1:
    <<: *chat-build
    environment:
      <<: *app-env
      OTEL_SERVICE_NAME: chat-service
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN:-http://localhost:3001}
    # Direct host port for the fan-out scenario (agent A on instance 1, B on 2).
    ports:
      - "8101:8084"
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  chat-service-2:
    <<: *chat-build
    environment:
      <<: *app-env
      OTEL_SERVICE_NAME: chat-service
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN:-http://localhost:3001}
    ports:
      - "8102:8084"
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # --- ingestion-service + worker ----------------------------------------
  ingestion-service:
    build:
      context: ..
      dockerfile: ops/docker/Dockerfile
      args:
        PKG: "@graft/ingestion-service"
        DIR: apps/ingestion-service
    image: graft/ingestion-service:local
    environment:
      <<: *app-env
      OTEL_SERVICE_NAME: ingestion-service
      S3_BUCKET: graft-kb
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
    ports:
      - "8082:8082"
    depends_on:
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully

  ingestion-worker:
    image: graft/ingestion-service:local
    command: ["node", "dist/worker/index.js"]
    environment:
      <<: *app-env
      OTEL_SERVICE_NAME: ingestion-worker
      S3_BUCKET: graft-kb
      S3_REGION: us-east-1
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
    depends_on:
      - ingestion-service

  # --- load balancer (ai round-robin, chat sticky WS) --------------------
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8090:8090" # → ai-service pool
      - "8091:8091" # → chat-service pool
    depends_on:
      - ai-service-1
      - ai-service-2
      - chat-service-1
      - chat-service-2

  # --- observability: traces / logs / metrics ----------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otel/config.yaml:ro
    depends_on:
      - tempo

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo

  loki:
    image: grafana/loki:3.3.2
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.3.2
    command: ["-config.file=/etc/promtail/config.yaml"]
    volumes:
      - ./observability/promtail/promtail.yaml:/etc/promtail/config.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:v3.0.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9009:9090"

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3300:3000"
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  pg-data:
  minio-data:
  tempo-data:
  loki-data:
  prometheus-data:
  grafana-data:
