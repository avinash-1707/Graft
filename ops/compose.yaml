# Infra-only local stack: the datastores plus two one-shot bootstrap jobs
# (Drizzle migrate, MinIO bucket init). The app services run on the host via
# pnpm — see ops/README.md. The nginx LB, the 2x ai/chat instances, and the
# observability stack now live only in ops/nginx + ops/observability (unwired
# from this file) and are used by the unit-29 load test, not day-to-day dev.
#
#   docker compose -f ops/compose.yaml up -d
#
# Host ports:
#   5432  postgres      6379  redis
#   9000  minio (S3 API)  9001  minio console (minioadmin / minioadmin)

name: graft

services:
  # --- datastores --------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: graft
      POSTGRES_PASSWORD: graft
      POSTGRES_DB: graft
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U graft -d graft"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/graft-kb &&
        echo "bucket ready"
    restart: "no"

  # --- one-shot DB migration (drizzle-kit) -------------------------------
  migrate:
    build:
      context: ..
      dockerfile: ops/docker/Dockerfile
      target: builder
      args:
        PKG: "@graft/db"
        DIR: packages/db
    image: graft/migrate:local
    working_dir: /repo/packages/db
    environment:
      DATABASE_URL: postgres://graft:graft@postgres:5432/graft
    command: ["pnpm", "exec", "drizzle-kit", "migrate"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  pg-data:
  minio-data:
